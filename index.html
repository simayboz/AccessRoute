<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İYTE AccessRoute - Prototip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; padding-bottom: 80px; }
        .iyte-red { background: linear-gradient(135deg, #be1e2d 0%, #8b151f 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; border-radius: 24px; overflow: hidden; height: 300px; background: #020617; }
        #cameraVideo { width: 100%; height: 100%; object-fit: cover; }
        .comment-photo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #475569; font-size: 2rem; padding: 0 0.1rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #fbbf24; }
    </style>
</head>
<body class="text-slate-100">
    <main id="app" class="mx-auto min-h-screen w-full max-w-md px-4 pt-4"></main>

    <script>
        (function () {
            // --- API ANAHTARI BURAYA ---
            const GEMINI_API_KEY = ""; 
            // ---------------------------

            const IYTE_LOCATIONS = [
                { id: "lib", title: "Kütüphane Rampası" },
                { id: "cafe", title: "Yemekhane Girişi" },
                { id: "chem", title: "Kimya Müh. Yokuşu" }
            ];

            const INITIAL_COMMENTS = [
                { id: "c1", locId: "chem", user: "Ahmet Yılmaz", photo: "https://images.unsplash.com/photo-1618510050511-62778523318f?q=80&w=400", rating: 2, text: "Çok dik, tekerlekli sandalye için imkansız.", date: "15 Mart 2024" },
            ];

            const state = {
                tab: "giris", // Başlangıç ekranı
                userName: "", // Giriş ekranında dolacak
                selectedLoc: "",
                imageSource: null,
                cameraActive: false,
                geminiLoading: false,
                geminiResult: "",
                showModal: false,
                comments: INITIAL_COMMENTS,
                // Yorum Ekleme Formu State'i
                newCommentPhoto: null,
                newCommentText: "",
                newCommentRating: 0 // Letterboxd yıldızları için
            };

            const app = document.getElementById("app");

            function renderGiris() {
                return `
                    <div class="flex flex-col items-center justify-center h-screen space-y-6 text-center">
                        <img src="https://upload.wikimedia.org/wikipedia/tr/0/08/Izmir_Yuksek_Teknoloji_Enstitusu_Logo.png" class="h-24 w-24 mb-4">
                        <div class="iyte-red p-4 rounded-2xl shadow-xl">
                            <h1 class="text-3xl font-black italic text-white">AccessRoute</h1>
                            <p class="text-sm text-red-100">İYTE Engelsiz Kampüs Asistanı</p>
                        </div>
                        <p class="text-slate-400 text-sm max-w-xs">Kampüsü daha erişilebilir kılmak için giriş yapın ve topluluğa katılın.</p>
                        <input type="text" id="userNameInput" placeholder="Adınız Soyadınız" class="w-full max-w-xs bg-white/5 border border-white/10 rounded-xl p-4 text-center text-lg outline-none focus:border-red-500">
                        <button data-action="submit-login" class="w-full max-w-xs iyte-red py-4 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform">Başla</button>
                    </div>
                `;
            }

            function renderAnaliz() {
                return `
                    <div class="space-y-4">
                        <div class="iyte-red rounded-3xl p-6 shadow-xl flex justify-between items-center">
                            <div>
                                <h1 class="text-2xl font-black italic">İYTE ANALİZ</h1>
                                <p class="text-xs opacity-80">Hoş geldin, ${state.userName}</p>
                            </div>
                            <img src="https://upload.wikimedia.org/wikipedia/tr/0/08/Izmir_Yuksek_Teknoloji_Enstitusu_Logo.png" class="h-12 w-12 opacity-80">
                        </div>

                        <div class="glass rounded-2xl p-4">
                            <label class="text-[10px] font-bold uppercase text-slate-400">Konum Seç:</label>
                            <select id="locSelect" class="w-full bg-transparent border-b border-slate-600 py-2 text-sm outline-none text-slate-100">
                                <option value="" class="bg-slate-900 text-slate-500">İşaretle...</option>
                                ${IYTE_LOCATIONS.map(l => `<option value="${l.id}" class="bg-slate-900" ${state.selectedLoc === l.id ? 'selected' : ''}>${l.title}</option>`).join('')}
                            </select>
                        </div>

                        <div class="camera-box shadow-2xl">
                            ${state.cameraActive ? '<video id="cameraVideo" autoplay playsinline muted></video>' : 
                             (state.imageSource ? `<img src="${state.imageSource}" class="w-full h-full object-cover">` : 
                             '<div class="flex items-center justify-center h-full text-slate-500 text-sm italic">Fotoğraf Çekin...</div>')}
                            ${state.cameraActive ? '<button data-action="take-photo" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-red-600 p-4 rounded-full text-2xl shadow-lg">📸</button>' : ''}
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            ${state.cameraActive ? 
                                '<button data-action="stop-camera" class="glass rounded-xl py-4 text-xs font-bold uppercase text-rose-400">❌ Kapat</button>' :
                                '<button data-action="open-camera" class="glass rounded-xl py-4 text-xs font-bold uppercase text-emerald-400">📷 Kamera</button>'
                            }
                            <label class="glass rounded-xl py-4 text-xs font-bold uppercase text-sky-400 flex items-center justify-center cursor-pointer">📂 Galeri<input type="file" accept="image/*" class="hidden" id="galleryInput"></label>
                        </div>

                        <button data-action="run-ai" class="w-full iyte-red py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2">✨ ANALİZ ET</button>
                    </div>
                `;
            }

            function renderTopluluk() {
                const addPhotoBtnClass = state.newCommentPhoto ? "border-emerald-500" : "border-slate-600";
                return `
                    <div class="space-y-6 pt-2">
                        <h2 class="text-xl font-bold border-b border-red-600 pb-2 inline-block">Topluluk Notları</h2>

                        <div class="glass rounded-2xl p-5 space-y-3 border border-white/10">
                            <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 rounded-full iyte-red flex items-center justify-center font-bold text-xs">${state.userName.substring(0,2).toUpperCase()}</div><span class="text-sm font-bold">${state.userName} olarak yorum yap</span></div>
                            <select id="newLocSelect" class="w-full bg-slate-800 rounded-xl p-3 text-sm text-slate-200"><option value="">Konum Seç...</option>${IYTE_LOCATIONS.map(l => `<option value="${l.id}">${l.title}</option>`).join('')}</select>
                            
                            <div class="flex gap-3 items-center">
                                <label class="border-2 border-dashed ${addPhotoBtnClass} rounded-xl w-20 h-20 flex flex-col items-center justify-center cursor-pointer text-slate-500 hover:text-slate-300">${state.newCommentPhoto ? `<img src="${state.newCommentPhoto}" class="w-full h-full object-cover rounded-xl">` : '<span class="text-2xl">+</span><span class="text-[9px]">Foto</span>'}<input type="file" accept="image/*" class="hidden" id="newCommentPhotoInput"></label>
                                <textarea id="newCommentText" class="flex-1 bg-slate-800 rounded-xl p-3 text-sm h-20 outline-none" placeholder="Rampa durumu, rüzgar..."></textarea>
                            </div>
                            
                            <div class="flex items-center justify-between gap-3">
                                <div class="star-rating">
                                    <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                                    <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                                    <input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label>
                                    <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                                    <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
                                </div>
                                <button data-action="add-new-comment" class="flex-1 iyte-red py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Paylaş</button>
                            </div>
                        </div>

                        <div class="space-y-4">
                        ${IYTE_LOCATIONS.map(loc => {
                            const locComments = state.comments.filter(c => c.locId === loc.id);
                            if (locComments.length === 0) return "";
                            return `<div class="space-y-3"><h3 class="font-bold text-red-400 text-sm pl-2">${loc.title}</h3>${locComments.map(c => `<div class="glass rounded-2xl p-4 flex gap-4 items-start shadow-md"><img src="${c.photo}" class="comment-photo border border-white/10"><div class="flex-1 space-y-1"><div class="flex justify-between items-center"><span class="font-bold text-sm text-slate-100">@${c.user}</span><span class="text-[10px] text-slate-500">${c.date}</span></div><p class="text-xs text-slate-300 leading-relaxed">${c.text}</p><div class="text-[10px] font-bold text-amber-400">${'⭐'.repeat(c.rating)}</div></div></div>`).join('')}</div>`;
                        }).join('')}
                        </div>
                    </div>
                `;
            }

            function renderModal() {
                if (!state.showModal) return "";
                return `<div class="modal-backdrop fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/95 backdrop-blur-md"><div class="bg-white text-slate-900 rounded-[32px] p-8 w-full shadow-2xl border-t-8 border-red-600"><h3 class="font-black italic text-red-700 text-xl mb-4 uppercase flex items-center gap-2">🤖 AI Kararı</h3>${state.geminiLoading ? '<div class="animate-pulse py-6 text-sm font-bold text-slate-400">Veriler harmanlanıyor...</div>' : `<div class="text-sm leading-relaxed mb-6 font-medium bg-slate-100 p-4 rounded-xl border border-slate-200">${state.geminiResult}</div>`}<div class="space-y-3 mt-4"><button data-action="go-to-comments" class="w-full py-4 iyte-red text-white rounded-xl font-bold text-xs uppercase tracking-widest">Yorum Yapmak İster Misin?</button><button data-action="close-modal" class="w-full py-3 text-slate-400 text-xs font-bold uppercase">Kapat</button></div></div></div>`;
            }

            function renderTabBar() {
                if (state.tab === "giris") return "";
                const tabs = [{ id: "analiz", label: "Analiz", icon: "📷" }, { id: "topluluk", label: "Topluluk", icon: "💬" }];
                return `<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-[400px] glass rounded-full p-2 flex justify-around shadow-2xl z-50">${tabs.map(t => `<button data-action="tab" data-id="${t.id}" class="flex-1 py-3 rounded-full ${state.tab===t.id?'iyte-red text-white':'text-slate-500'} font-bold text-[10px] uppercase flex flex-col items-center gap-1"><span class="text-lg">${t.icon}</span>${t.label}</button>`).join('')}</nav>`;
            }

            function render() {
                let content = "";
                if (state.tab === "giris") content = renderGiris();
                else if (state.tab === "analiz") content = renderAnaliz();
                else content = renderTopluluk();
                app.innerHTML = content + renderModal() + renderTabBar();
                if (state.cameraActive) startVideo();
            }

            // --- MEDYA VE AI FONKSİYONLARI ---
            async function startVideo() {
                const v = document.getElementById("cameraVideo");
                if (v && !stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    v.srcObject = stream;
                }
            }

            function takePhoto() {
                const video = document.getElementById("cameraVideo");
                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext("2d").drawImage(video, 0, 0);
                state.imageSource = canvas.toDataURL("image/jpeg");
                state.newCommentPhoto = state.imageSource; // Yorum formu için de hazırla
                stopVideo(); render();
            }

            function stopVideo() {
                if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                state.cameraActive = false;
            }

            async function runAI() {
                if (!state.selectedLoc) return alert("⚠️ Önce konum seçin!");
                if (!state.imageSource) return alert("⚠️ Önce fotoğraf çekin!");
                state.showModal = true; state.geminiLoading = true; render();
                // Simülasyon
                setTimeout(() => {
                    state.geminiLoading = false;
                    state.geminiResult = `🤖 **Merhaba ${state.userName.split(' ')[0]}**, Kütüphane Rampası fotoğrafını analiz ettim. Eğim %12 civarında. Ahmet Yılmaz'ın 'Rampa başında çökme var' yorumunu da hesaba katarsak, burayı tek başına geçmen riskli olabilir. Lütfen yardım al!`;
                    render();
                }, 2000);
            }

            function addNewComment() {
                const locId = document.getElementById("newLocSelect").value;
                const text = state.newCommentText.trim();
                const rating = state.newCommentRating;
                const photo = state.newCommentPhoto;
                if (!locId || !text || !photo || rating === 0) return alert("⚠️ Konum, fotoğraf, puan ve yorum eksik!");

                const now = new Date();
                const formattedDate = `${now.getDate()} ${["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"][now.getMonth()]} ${now.getFullYear()}`;

                state.comments = [{ id: "c" + (state.comments.length + 1), locId, user: state.userName, photo, rating, text, date: formattedDate }, ...state.comments];
                
                // Formu temizle
                state.newCommentPhoto = null; state.newCommentText = ""; state.newCommentRating = 0; state.imageSource = null;
                render();
            }

            let stream = null;

            // --- EVENTS ---
            app.addEventListener("click", e => {
                const btn = e.target.closest("[data-action]");
                if (!btn) return;
                const act = btn.dataset.action;
                if (act === "submit-login") {
                    const name = document.getElementById("userNameInput").value.trim();
                    if (name.length < 3) return alert("⚠️ Lütfen adınızı soyadınızı girin.");
                    state.userName = name; state.tab = "analiz"; render();
                }
                if (act === "tab") { state.tab = btn.dataset.id; render(); }
                if (act === "open-camera") { state.cameraActive = true; render(); }
                if (act === "take-photo") takePhoto();
                if (act === "stop-camera") { stopVideo(); render(); }
                if (act === "run-ai") runAI();
                if (act === "close-modal") { state.showModal = false; render(); }
                if (act === "go-to-comments") { state.showModal = false; state.tab = "topluluk"; render(); }
                if (act === "add-new-comment") addNewComment();
            });

            // Yıldız Tıklamalarını Yakala
            app.addEventListener("change", e => {
                if (e.target.name === "rating") state.newCommentRating = parseInt(e.target.value);
                if (e.target.id === "locSelect") state.selectedLoc = e.target.value;
                if (e.target.id === "newCommentText") state.newCommentText = e.target.value;
                if (e.target.id === "galleryInput" && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = ev => { state.imageSource = ev.target.result; state.newCommentPhoto = state.imageSource; state.cameraActive = false; render(); };
                    reader.readAsDataURL(e.target.files[0]);
                }
                if (e.target.id === "newCommentPhotoInput" && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = ev => { state.newCommentPhoto = ev.target.result; render(); };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            render();
        })();
    </script>
</body>
</html>
