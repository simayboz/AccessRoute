<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AccessRoute - İYTE Engelsiz Kampüs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); /* Çok koyu gece mavisi gradient */
            color: white; 
            min-height: 100vh;
            margin: 0;
            background-attachment: fixed;
        }
        /* YENİ: Kusursuz Glassmorphism (Buzlu Cam) */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .iyte-red { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); }
        .camera-box { aspect-ratio: 3/4; border-radius: 24px; overflow: hidden; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        
        /* YENİ: Yumuşak Sayfa Geçiş Animasyonları */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* YENİ: AI Analiz Nabız Animasyonu */
        @keyframes pulse-ring { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .ai-spinner { border-radius: 50%; animation: pulse-ring 2s infinite; }
        
        /* Gelişmiş Yıldız Puanlama */
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 4px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 32px; color: #334155; cursor: pointer; transition: all 0.2s; }
        .star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body class="antialiased selection:bg-red-500/30">
    <div id="app" class="pb-24 max-w-md mx-auto min-h-screen relative"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="features/app.js"></script>
</body>
</html>
