<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İYTE AccessRoute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .iyte-red { background: linear-gradient(135deg, #be1e2d 0%, #8b151f 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; border-radius: 24px; overflow: hidden; height: 300px; background: #020617; }
        #cameraVideo { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="text-slate-100">
    <main id="app" class="mx-auto min-h-screen w-full max-w-md px-4 pb-28 pt-4"></main>

    <script>
        (function () {
            // API Anahtarın burada güvende!
            const GEMINI_API_KEY = "AIzaSyDYsLXVQFzFM3GGLkjtEon9HewwsRK6TRQ";

            const IYTE_LOCATIONS = [
                { id: "lib", title: "Kütüphane Rampası", comments: ["Eğim orta ama rüzgar çok sert.", "Zemin biraz pürüzlü."] },
                { id: "cafe", title: "Yemekhane Girişi", comments: ["Basamaklar yüksek, rampa arkada kalıyor.", "Zemin yağmurda kaygan."] },
                { id: "chem", title: "Kimya Müh. Yokuşu", comments: ["Çok dik, tekerlekli sandalye için zor.", "Mutlaka yardım isteyin."] },
                { id: "dorm", title: "KYK Yurdu Yolu", comments: ["Yol çalışması var, daralmış.", "Işıklandırma yetersiz."] }
            ];

            const state = {
                tab: "analiz",
                selectedLoc: "",
                imageSource: null, 
                cameraActive: false,
                geminiLoading: false,
                geminiResult: "",
                showModal: false
            };

            const app = document.getElementById("app");

            function renderAnaliz() {
                return `
                    <div class="space-y-4">
                        <div class="iyte-red rounded-3xl p-6 shadow-xl">
                            <h1 class="text-2xl font-black italic">İYTE ANALİZ</h1>
                            <p class="text-xs opacity-80">Konum seç, fotoğraf çek, AI karar versin.</p>
                        </div>

                        <div class="glass rounded-2xl p-4">
                            <label class="text-[10px] font-bold uppercase text-slate-400">Önce Konumu Seç:</label>
                            <select id="locSelect" class="w-full bg-transparent border-b border-slate-600 py-2 text-sm outline-none focus:border-red-500 transition-colors">
                                <option value="" class="bg-slate-900">Konum İşaretle...</option>
                                ${IYTE_LOCATIONS.map(l => `<option value="${l.id}" class="bg-slate-900" ${state.selectedLoc === l.id ? 'selected' : ''}>${l.title}</option>`).join('')}
                            </select>
                        </div>

                        <div class="camera-box shadow-2xl">
                            ${state.cameraActive ? '<video id="cameraVideo" autoplay playsinline muted></video>' : 
                             (state.imageSource ? `<img src="${state.imageSource}" class="w-full h-full object-cover">` : 
                             '<div class="flex items-center justify-center h-full text-slate-500 text-sm italic">Görsel Bekleniyor...</div>')}
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <button data-action="open-camera" class="glass rounded-xl py-4 text-xs font-bold uppercase tracking-widest hover:bg-white/10">📷 Kamerayı Aç</button>
                            <label class="glass rounded-xl py-4 text-xs font-bold uppercase tracking-widest hover:bg-white/10 flex items-center justify-center cursor-pointer">
                                📂 Galeri
                                <input type="file" accept="image/*" class="hidden" id="galleryInput">
                            </label>
                        </div>

                        <button data-action="run-ai" class="w-full iyte-red py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform">
                            ✨ ANALİZ ET & TAVSİYE AL
                        </button>
                    </div>
                `;
            }

            function renderTopluluk() {
                return `
                    <div class="space-y-4">
                        <h2 class="text-xl font-bold border-b border-red-600 pb-2 inline-block">İYTE Topluluk Notları</h2>
                        ${IYTE_LOCATIONS.map(l => `
                            <div class="glass rounded-2xl p-4 space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-red-400">${l.title}</span>
                                    <span class="text-[10px] bg-slate-700 px-2 py-1 rounded">5.0 ⭐</span>
                                </div>
                                ${l.comments.map(c => `<p class="text-xs text-slate-300">💬 ${c}</p>`).join('')}
                            </div>
                        `).join('')}
                        <button class="w-full py-4 glass rounded-2xl text-xs font-bold uppercase">+ Yeni Yorum Ekle</button>
                    </div>
                `;
            }

            function renderModal() {
                if (!state.showModal) return "";
                return `
                    <div class="modal-backdrop fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                        <div class="bg-white text-slate-900 rounded-[32px] p-8 w-full shadow-2xl border-t-8 border-red-600">
                            <h3 class="font-black italic text-red-700 text-xl mb-4 uppercase">AI Kararı</h3>
                            ${state.geminiLoading ? '<div class="animate-pulse text-sm font-bold text-slate-400">Veriler ve görsel harmanlanıyor...</div>' : 
                            `<div class="text-sm leading-relaxed mb-6 font-medium">${state.geminiResult}</div>`}
                            <div class="space-y-3">
                                ${!state.geminiLoading ? '<button data-action="go-to-comments" class="w-full py-4 iyte-red text-white rounded-xl font-bold text-xs uppercase tracking-widest">Yorum Yapmak İster Misin?</button>' : ''}
                                <button data-action="close-modal" class="w-full py-3 text-slate-400 text-xs font-bold uppercase">Kapat</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            function render() {
                app.innerHTML = (state.tab === "analiz" ? renderAnaliz() : renderTopluluk()) + 
                                renderModal() + 
                                `<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] glass rounded-3xl p-2 flex justify-around shadow-2xl z-50">
                                    <button data-action="tab" data-id="analiz" class="flex-1 py-3 rounded-2xl ${state.tab==='analiz'?'iyte-red text-white':'text-slate-500'} font-bold text-[10px] uppercase">Analiz</button>
                                    <button data-action="tab" data-id="topluluk" class="flex-1 py-3 rounded-2xl ${state.tab==='topluluk'?'iyte-red text-white':'text-slate-500'} font-bold text-[10px] uppercase">Topluluk</button>
                                </nav>`;
                if (state.cameraActive) startVideo();
            }

            async function startVideo() {
                const v = document.getElementById("cameraVideo");
                if (v && !v.srcObject) {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        v.srcObject = s;
                    } catch (e) {
                        console.error("Kamera açılamadı", e);
                    }
                }
            }

            function stopVideo() {
                const v = document.getElementById("cameraVideo");
                if (v && v.srcObject) {
                    v.srcObject.getTracks().forEach(t => t.stop());
                    v.srcObject = null;
                }
            }

            async function runAI() {
                if (!state.selectedLoc) return alert("Lütfen önce yukarıdan bir konum seçin!");
                if (!state.cameraActive && !state.imageSource) return alert("Lütfen kamerayı açın veya galeriden fotoğraf seçin!");

                state.showModal = true; 
                state.geminiLoading = true; 
                render();

                let base64Image = "";

                if (state.cameraActive) {
                    const video = document.getElementById("cameraVideo");
                    const canvas = document.createElement("canvas");
                    canvas.width = video.videoWidth || 640; 
                    canvas.height = video.videoHeight || 480;
                    canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL("image/jpeg").split(',')[1];
                } else if (state.imageSource) {
                    base64Image = state.imageSource.split(',')[1];
                }

                const locInfo = IYTE_LOCATIONS.find(l => l.id === state.selectedLoc);
                const prompt = `Sen İYTE kampüsü erişilebilirlik asistanısın. Kullanıcının seçtiği konum: ${locInfo.title}. Bu bölge için diğer öğrencilerin yorumları: "${locInfo.comments.join(' | ')}". Gönderdiğim fotoğrafa ve bu öğrenci yorumlarına bakarak detaylı bir analiz yap. Eğer yol veya rampa tekerlekli sandalye veya yürüme güçlüğü çeken biri için riskliyse mutlaka 'başka alternatif yoldan git' veya 'birinden yardım iste' gibi samimi bir tavsiye ver.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                                ]
                            }]
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    state.geminiResult = data.candidates[0].content.parts[0].text;
                } catch (error) {
                    state.geminiResult = "⚠️ Bağlantı hatası oluştu: " + error.message;
                }

                state.geminiLoading = false;
                render();
            }

            app.addEventListener("click", e => {
                const btn = e.target.closest("[data-action]");
                if (!btn) return;
                const act = btn.dataset.action;
                
                if (act === "tab") { 
                    state.tab = btn.dataset.id; 
                    if(state.tab !== 'analiz') stopVideo();
                    render(); 
                }
                if (act === "open-camera") { 
                    state.cameraActive = true; 
                    state.imageSource = null; 
                    render(); 
                }
                if (act === "run-ai") runAI();
                if (act === "close-modal") { 
                    state.showModal = false; 
                    render(); 
                }
                if (act === "go-to-comments") { 
                    state.showModal = false; 
                    state.tab = "topluluk"; 
                    stopVideo();
                    render(); 
                }
            });

            app.addEventListener("change", e => {
                if (e.target.id === "locSelect") state.selectedLoc = e.target.value;
                if (e.target.id === "galleryInput" && e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = ev => { 
                        state.imageSource = ev.target.result; 
                        state.cameraActive = false; 
                        stopVideo();
                        render(); 
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            render();
        })();
    </script>
</body>
</html>
