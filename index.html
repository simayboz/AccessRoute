<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İYTE AccessRoute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; padding-bottom: 80px; }
        .iyte-red { background: linear-gradient(135deg, #be1e2d 0%, #8b151f 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; border-radius: 24px; overflow: hidden; height: 300px; background: #020617; }
        #cameraVideo { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="text-slate-100">
    <main id="app" class="mx-auto min-h-screen w-full max-w-md px-4 pt-4"></main>

    <script>
        (function () {
            let GEMINI_API_KEY = localStorage.getItem("gemini_api_key");
            
            const IYTE_LOCATIONS = [
                { id: "lib", title: "Kütüphane Rampası" },
                { id: "cafe", title: "Yemekhane Girişi" },
                { id: "chem", title: "Kimya Müh. Yokuşu" }
            ];

            const state = {
                tab: "giris", userName: "", selectedLoc: "", imageSource: null,
                cameraActive: false, geminiLoading: false, geminiResult: "", showModal: false
            };

            const app = document.getElementById("app");

            function renderGiris() {
                return `
                    <div class="flex flex-col items-center justify-center h-screen space-y-6 text-center">
                        <div class="iyte-red p-5 rounded-3xl shadow-2xl w-full max-w-xs">
                            <h1 class="text-3xl font-black italic text-white">AccessRoute</h1>
                            <p class="text-sm text-red-100 mt-1">İYTE Engelsiz Kampüs</p>
                        </div>
                        <div class="w-full max-w-xs space-y-4">
                            <input type="text" id="userNameInput" placeholder="Adınız Soyadınız" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-center text-lg outline-none focus:border-red-500">
                            
                            ${!GEMINI_API_KEY ? 
                            `<input type="password" id="apiKeyInput" placeholder="YENİ API Anahtarını Yapıştır" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-center text-sm outline-none focus:border-red-500 text-emerald-400">` : 
                            `<div class="space-y-2">
                                <p class="text-xs text-emerald-500 font-bold">✅ API Anahtarı Hazır</p>
                                <button data-action="reset-key" class="text-[10px] text-rose-400 underline">Eski Anahtarı Sil / Sıfırla</button>
                            </div>`}
                            
                            <button data-action="submit-login" class="w-full iyte-red py-4 rounded-xl font-black text-white shadow-lg active:scale-95 transition-transform text-lg">Uygulamayı Başlat</button>
                        </div>
                    </div>`;
            }

            function renderAnaliz() {
                return `
                    <div class="space-y-4">
                        <div class="iyte-red rounded-3xl p-6 shadow-xl">
                            <h1 class="text-2xl font-black italic">ANALİZ</h1>
                            <p class="text-xs opacity-80">Hoş geldin, ${state.userName}</p>
                        </div>
                        <div class="glass rounded-2xl p-4">
                            <select id="locSelect" class="w-full bg-transparent border-b border-slate-600 py-2 text-sm outline-none text-slate-100">
                                <option value="" class="bg-slate-900">Konum Seç...</option>
                                ${IYTE_LOCATIONS.map(l => `<option value="${l.id}" class="bg-slate-900" ${state.selectedLoc === l.id ? 'selected' : ''}>${l.title}</option>`).join('')}
                            </select>
                        </div>
                        <div class="camera-box shadow-2xl">
                            ${state.cameraActive ? '<video id="cameraVideo" autoplay playsinline muted></video>' : 
                             (state.imageSource ? `<img src="${state.imageSource}" class="w-full h-full object-cover">` : 
                             '<div class="flex items-center justify-center h-full text-slate-500 text-sm italic">Fotoğraf Çek...</div>')}
                            ${state.cameraActive ? '<button data-action="take-photo" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white text-red-600 p-4 rounded-full text-2xl shadow-lg">📸</button>' : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button data-action="${state.cameraActive?'stop-camera':'open-camera'}" class="glass rounded-xl py-4 text-xs font-bold uppercase ${state.cameraActive?'text-rose-400':'text-emerald-400'}">${state.cameraActive?'Kapat':'Kamera'}</button>
                            <label class="glass rounded-xl py-4 text-xs font-bold uppercase text-sky-400 flex items-center justify-center cursor-pointer">Galeri<input type="file" accept="image/*" class="hidden" id="galleryInput"></label>
                        </div>
                        <button data-action="run-ai" class="w-full iyte-red py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95">✨ ANALİZ ET</button>
                    </div>`;
            }

            async function runAI() {
                if (!state.selectedLoc || !state.imageSource) return alert("Lütfen konum seçin ve fotoğraf çekin!");
                state.showModal = true; state.geminiLoading = true; render();
                
                const locInfo = IYTE_LOCATIONS.find(l => l.id === state.selectedLoc);
                const prompt = `Sen İYTE kampüsü erişilebilirlik asistanısın. Konum: ${locInfo.title}. Fotoğrafı analiz et. Görselde rampa/yol mu var yoksa bir insan/eşya mı? Eğer insan/eşya ise esprili bir dille uyar. Eğer rampaysa eğimini yorumla ve tavsiye ver.`;

                try {
                    const base64Data = state.imageSource.split(',')[1];
                    // EN STABİL VE DOĞRU API LİNKİ
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    state.geminiResult = data.candidates[0].content.parts[0].text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                } catch (error) {
                    state.geminiResult = `❌ Hata: ${error.message}`;
                    if(error.message.includes("API key")) {
                        localStorage.removeItem("gemini_api_key");
                        GEMINI_API_KEY = null;
                    }
                }
                state.geminiLoading = false; render();
            }

            function renderModal() {
                if (!state.showModal) return "";
                return `<div class="modal-backdrop fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/95 backdrop-blur-md"><div class="bg-white text-slate-900 rounded-[32px] p-8 w-full shadow-2xl border-t-8 border-red-600"><h3 class="font-black italic text-red-700 text-xl mb-4">AI KARARI</h3>${state.geminiLoading ? '<div class="animate-pulse py-4 font-bold text-slate-400">Analiz ediliyor...</div>' : `<div class="text-sm leading-relaxed mb-6 max-h-60 overflow-y-auto">${state.geminiResult}</div>`}<button data-action="close-modal" class="w-full py-4 iyte-red text-white rounded-xl font-bold uppercase">Kapat</button></div></div>`;
            }

            function render() {
                app.innerHTML = (state.tab === "giris" ? renderGiris() : renderAnaliz()) + renderModal();
                if (state.cameraActive && state.tab === "analiz") startVideo();
            }

            async function startVideo() {
                const v = document.getElementById("cameraVideo");
                if (v && !window.stream) {
                    window.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    v.srcObject = window.stream;
                }
            }

            app.addEventListener("click", e => {
                const btn = e.target.closest("[data-action]");
                if (!btn) return;
                const act = btn.dataset.action;
                
                if (act === "reset-key") {
                    localStorage.removeItem("gemini_api_key");
                    GEMINI_API_KEY = null;
                    render();
                    return;
                }

                if (act === "submit-login") {
                    const name = document.getElementById("userNameInput").value;
                    const key = document.getElementById("apiKeyInput")?.value;
                    if (name.length < 2) return alert("İsim giriniz");
                    if (key) { GEMINI_API_KEY = key; localStorage.setItem("gemini_api_key", key); }
                    if (!GEMINI_API_KEY) return alert("Lütfen API Anahtarı girin!");
                    state.userName = name; state.tab = "analiz"; render();
                }
                if (act === "open-camera") { state.cameraActive = true; render(); }
                if (act === "take-photo") {
                    const video = document.getElementById("cameraVideo");
                    const canvas = document.createElement("canvas");
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext("2d").drawImage(video, 0, 0);
                    state.imageSource = canvas.toDataURL("image/jpeg");
                    state.cameraActive = false; if(window.stream) window.stream.getTracks().forEach(t=>t.stop()); window.stream = null; render();
                }
                if (act === "run-ai") runAI();
                if (act === "close-modal") { state.showModal = false; render(); }
            });

            app.addEventListener("change", e => {
                if (e.target.id === "locSelect") state.selectedLoc = e.target.value;
                if (e.target.id === "galleryInput") {
                    const reader = new FileReader();
                    reader.onload = ev => { state.imageSource = ev.target.result; render(); };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            render();
        })();
    </script>
</body>
</html>
