<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccessRoute - Süper Ekran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: Inter, "Segoe UI", Roboto, system-ui, sans-serif;
        background: #0f172a;
      }
      .focus-ring:focus-visible {
        outline: 3px solid #60a5fa;
        outline-offset: 2px;
      }
      .camera-shell {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        height: min(65vh, 500px); /* Ekranı biraz daha optimize ettik */
        background: #020617;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      }
      .camera-video,
      .overlay-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* Modal Arka Planı */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(4px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
    </style>
  </head>
  <body class="text-slate-100">
    <main id="app" class="mx-auto min-h-screen w-full max-w-md px-4 pb-24 pt-4"></main>
    <script>
      (function () {
        // --- BURASI ÇOK ÖNEMLİ: KENDİ GEMINI API ANAHTARINI BURAYA YAZACAKSIN ---
        // Eğer boş bırakırsan, sistem "Simülasyon Modunda" çalışır ve örnek bir cevap verir.
        const GEMINI_API_KEY = ""; 
        // --------------------------------------------------------------------------

        const FEED = [
          {
            id: "1", title: "Alsancak Kordon - Bozuk Kaldırım", location: "Konak, İzmir",
            risk: "Yüksek", reactions: 21, notes: ["Ben de buradayım, hâlâ geçilmiyor."]
          },
          {
            id: "2", title: "İzmir Metro - Bozuk Asansör", location: "Halkapınar",
            risk: "Yüksek", reactions: 30, notes: ["Asansör kapalı, alternatif rota çok uzun."]
          }
        ];

        const state = {
          tab: "tarama",
          profile: "bedensel",
          feed: FEED,
          drafts: {},
          cameraReady: false,
          cameraError: "",
          beta: 0,
          gamma: 0,
          slopePercent: 0,
          slopeDegree: 0,
          statusText: "%0 Eğim - Ölçüm Bekleniyor",
          statusColor: "#22c55e",
          alignWarning: "Ölçüm için telefonu rampaya paralel tutun.",
          aiInsight: "Zemin taranıyor...",
          aiConfidence: 0,
          // Modal State
          showModal: false,
          geminiLoading: false,
          geminiResult: ""
        };

        let stream = null;
        let rafId = null;
        let orientationEnabled = false;
        let lastSpokenStatus = "";

        const app = document.getElementById("app");

        function speak(text) {
          if (!window.speechSynthesis) return;
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "tr-TR";
          utterance.rate = 0.95;
          window.speechSynthesis.speak(utterance);
        }

        function getStatusBySlope(percent) {
          if (percent <= 8) return { text: "%" + percent + " Eğim - Güvenli", color: "#22c55e" };
          if (percent <= 11) return { text: "%" + percent + " Eğim - Sınırda", color: "#f59e0b" };
          return { text: "%" + percent + " Eğim - Riskli", color: "#ef4444" };
        }

        function renderTarama() {
          return (
            '<section class="space-y-3">' +
            '<div class="flex items-center justify-between rounded-3xl bg-slate-800 p-4 shadow-lg">' +
              '<div><p class="text-xs uppercase tracking-widest text-slate-400">AccessRoute</p><h1 class="mt-1 text-xl font-bold">Kamera & Analiz</h1></div>' +
              '<div class="text-right"><span class="rounded-full bg-blue-500/20 px-3 py-1 text-xs font-bold text-blue-300">Canlı AR</span></div>' +
            '</div>' +
            
            // Kamera ve Su Terazisi Alanı
            '<div class="camera-shell">' +
              '<video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>' +
              '<canvas id="overlayCanvas" class="overlay-canvas"></canvas>' +
              '<div class="pointer-events-none absolute bottom-4 left-0 right-0 flex justify-center text-xs font-semibold text-white/80 drop-shadow-md">' +
                (state.alignWarning || "Eğim ölçümü aktif") +
              '</div>' +
              (state.cameraError ? '<div class="absolute inset-0 flex items-center justify-center bg-slate-900/90 p-4 text-center text-rose-400">' + state.cameraError + '</div>' : '') +
            '</div>' +
            
            // Basit Sensör Yorumu
            '<div class="rounded-2xl bg-white p-3 text-slate-900 shadow-lg">' +
              '<p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Hızlı Sensör Yorumu</p>' +
              '<p class="mt-1 text-sm font-semibold">' + state.aiInsight + '</p>' +
            '</div>' +
            
            // Dev Gemini Butonu
            '<button data-action="ask-gemini" class="focus-ring mt-2 w-full rounded-2xl bg-gradient-to-r from-violet-600 to-blue-600 px-4 py-4 text-lg font-bold text-white shadow-xl hover:from-violet-500 hover:to-blue-500 active:scale-95 transition-all flex items-center justify-center gap-2">' +
              '<span>✨</span> Engeli Analiz Et (Yapay Zeka)' +
            '</button>' +
            '</section>'
          );
        }

        function renderTopluluk() {
          // Topluluk render kodunu şimdilik kısa tutuyoruz, öncekiyle aynı mantık
          return '<section class="space-y-3"><h2 class="text-xl font-bold">Topluluk Bildirimleri</h2><p class="text-sm text-slate-400">Yakınınızdaki güncel engeller...</p></section>';
        }

        function renderProfil() {
          return '<section class="space-y-3"><h2 class="text-xl font-bold">Profil Ayarları</h2><div class="rounded-2xl bg-white p-4 text-slate-900"><p>Mevcut Profil: <strong>' + (state.profile === 'bedensel' ? 'Bedensel Engelli' : 'Görme Engelli') + '</strong></p></div></section>';
        }

        function renderModal() {
          if (!state.showModal) return "";
          return (
            '<div class="modal-backdrop">' +
              '<div class="w-full max-w-sm rounded-3xl bg-white p-6 text-slate-900 shadow-2xl">' +
                '<h3 class="text-lg font-bold text-indigo-700 mb-2">✨ Gemini Analizi</h3>' +
                (state.geminiLoading 
                  ? '<div class="flex flex-col items-center py-6"><div class="h-8 w-8 animate-spin rounded-full border-4 border-indigo-200 border-t-indigo-600 mb-4"></div><p class="text-sm font-semibold text-slate-600">Görsel işleniyor, lütfen bekleyin...</p></div>' 
                  : '<div class="max-h-60 overflow-y-auto"><p class="text-sm text-slate-700">' + state.geminiResult + '</p></div>') +
                '<div class="mt-6 flex gap-3">' +
                  (!state.geminiLoading && state.profile === "gorme" ? '<button data-action="replay-gemini" class="flex-1 rounded-xl bg-indigo-100 py-3 text-sm font-bold text-indigo-700">🔊 Tekrar Dinle</button>' : '') +
                  '<button data-action="close-modal" class="' + (state.geminiLoading ? 'w-full opacity-50 cursor-not-allowed' : 'flex-1') + ' rounded-xl bg-slate-900 py-3 text-sm font-bold text-white"' + (state.geminiLoading ? ' disabled' : '') + '>Kapat</button>' +
                '</div>' +
              '</div>' +
            '</div>'
          );
        }

        function renderTabBar() {
          const tabs = [
            { id: "tarama", label: "Tarama", icon: "📷" },
            { id: "topluluk", label: "Topluluk", icon: "💬" },
            { id: "profil", label: "Profil", icon: "👤" }
          ];
          return (
            '<nav class="fixed bottom-4 left-1/2 z-50 w-[calc(100%-20px)] max-w-[430px] -translate-x-1/2 rounded-3xl border border-slate-700 bg-slate-900/90 p-2 backdrop-blur shadow-2xl"><ul class="grid grid-cols-3 gap-1">' +
            tabs.map(function (tab) {
              const active = tab.id === state.tab ? "bg-blue-600 text-white shadow-md" : "text-slate-400 hover:bg-slate-800";
              return '<li><button data-action="switch-tab" data-tab="' + tab.id + '" class="focus-ring flex w-full flex-col items-center rounded-2xl px-2 py-2 text-xs font-bold ' + active + '"><span class="text-xl mb-1">' + tab.icon + '</span><span>' + tab.label + '</span></button></li>';
            }).join("") +
            "</ul></nav>"
          );
        }

        function render() {
          let content = "";
          if (state.tab === "tarama") content = renderTarama();
          if (state.tab === "topluluk") content = renderTopluluk();
          if (state.tab === "profil") content = renderProfil();
          app.innerHTML = content + renderModal() + renderTabBar();
          syncMediaElements();
        }

        function syncMediaElements() {
          const video = document.getElementById("cameraVideo");
          if (video && stream && video.srcObject !== stream) {
            video.srcObject = stream;
          }
        }

        async function enableMotionPermission() {
          if (!("DeviceOrientationEvent" in window)) return false;
          if (typeof DeviceOrientationEvent.requestPermission === "function") {
            try {
              const res = await DeviceOrientationEvent.requestPermission();
              return res === "granted";
            } catch (e) { return false; }
          }
          return true;
        }

        function handleOrientation(e) {
          if (e.beta == null || e.gamma == null) return;
          state.beta = e.beta;
          state.gamma = e.gamma;
          state.slopeDegree = Number(Math.abs(e.beta).toFixed(1));
          state.slopePercent = Math.max(0, Math.round(Math.tan((state.slopeDegree * Math.PI) / 180) * 100));
          
          const status = getStatusBySlope(state.slopePercent);
          state.statusText = status.text;
          state.statusColor = status.color;
          state.alignWarning = Math.abs(e.gamma) > 15 ? "Daha doğru ölçüm için telefonu dik/paralel tutun." : "";
        }

        function drawOverlay() {
          const canvas = document.getElementById("overlayCanvas");
          if (!canvas || state.tab !== "tarama") {
            rafId = requestAnimationFrame(drawOverlay);
            return;
          }
          const ctx = canvas.getContext("2d");
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          if (!w || !h) {
            rafId = requestAnimationFrame(drawOverlay);
            return;
          }
          if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w;
            canvas.height = h;
          }

          ctx.clearRect(0, 0, w, h);

          // Eğim Çizgisi (Su Terazisi)
          const centerY = h / 2 + state.gamma * 3; 
          const margin = 40;
          ctx.lineWidth = 6;
          ctx.strokeStyle = state.statusColor;
          ctx.beginPath();
          ctx.moveTo(margin, centerY);
          ctx.lineTo(w - margin, centerY);
          ctx.stroke();

          // Ortadaki yuvarlak
          ctx.beginPath();
          ctx.fillStyle = state.statusColor;
          ctx.arc(w / 2, centerY, 10, 0, Math.PI * 2);
          ctx.fill();

          // Üstteki Yüzde Yazısı Arka Planı
          ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
          ctx.beginPath();
          ctx.roundRect(w/2 - 120, 20, 240, 50, 12);
          ctx.fill();

          // Yüzde Yazısı
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 22px Inter, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(state.statusText, w / 2, 54);

          rafId = requestAnimationFrame(drawOverlay);
        }

        async function startScan() {
          if (state.cameraReady) return;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment" },
              audio: false
            });
            state.cameraReady = true;
            state.cameraError = "";
          } catch (error) {
            state.cameraError = "Kamera açılamadı. Tarayıcıdan izin verip sayfayı yenileyin.";
          }
          
          const motionOk = await enableMotionPermission();
          if (motionOk && !orientationEnabled) {
            window.addEventListener("deviceorientation", handleOrientation);
            orientationEnabled = true;
          }
          render();
        }

        function stopScan() {
          if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
          }
          state.cameraReady = false;
        }

        // --- GEMINI API ÇAĞRISI ---
        async function runGeminiAnalysis() {
          if (!state.cameraReady) {
            alert("Önce kameranın açılması gerekiyor.");
            return;
          }

          // 1. Ekranı dondur ve fotoğrafı çek
          const video = document.getElementById("cameraVideo");
          const canvas = document.createElement("canvas");
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          
          // Base64 formatına çevir (Sadece data kısmı lazım)
          const base64Image = canvas.toDataURL("image/jpeg").split(',')[1];

          // 2. Modalı Yükleniyor durumunda aç
          state.showModal = true;
          state.geminiLoading = true;
          state.geminiResult = "";
          render();

          // 3. Prompt (Yapay Zekaya ne soracağız?)
          const prompt = "Sen uzman bir erişilebilirlik asistanısın. Bu görseldeki alanı tekerlekli sandalye kullanan veya görme engelli bir birey için analiz et. Eğer bir rampa, merdiven, çukur veya engel varsa detaylıca ama kısa ve samimi bir dille açıkla. Geçiş güvenli mi, riskli mi belirt.";

          // 4. API'ye Gönder
          try {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "") {
              // API Key yoksa test simülasyonu yap
              await new Promise(r => setTimeout(r, 2000)); // 2 saniye bekle
              state.geminiResult = "⚠️ Simülasyon Modu: Proje kodunun içine gerçek API anahtarınızı girmediğiniz için bu örnek bir cevaptır. Ancak görseldeki rampa şu anlık engelli geçişi için oldukça dik ve riskli görünüyor.";
            } else {
              // Gerçek API İsteği
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{
                    parts: [
                      { text: prompt },
                      { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                  }]
                })
              });
              const data = await response.json();
              if (data.error) throw new Error(data.error.message);
              state.geminiResult = data.candidates[0].content.parts[0].text;
            }
          } catch (error) {
            state.geminiResult = "Bağlantı hatası oluştu veya API limiti doldu. Detay: " + error.message;
          }

          // 5. Sonucu Ekrana Bas
          state.geminiLoading = false;
          render();
          
          // Görme engelli modundaysa hemen oku
          if (state.profile === "gorme" && state.geminiResult) {
            speak(state.geminiResult);
          }
        }

        // --- TIKLAMA OLAYLARI (EVENTS) ---
        app.addEventListener("click", function (event) {
          const btn = event.target.closest("[data-action]");
          if (!btn) return;
          const action = btn.dataset.action;

          if (action === "switch-tab") {
            const next = btn.dataset.tab;
            if (next !== "tarama" && state.tab === "tarama") stopScan();
            state.tab = next;
            render();
            if (next === "tarama") startScan();
          }

          if (action === "ask-gemini") {
            runGeminiAnalysis();
          }

          if (action === "close-modal") {
            if (state.geminiLoading) return; // Yüklenirken kapatılamasın
            state.showModal = false;
            if (window.speechSynthesis) window.speechSynthesis.cancel(); // Sesi sustur
            render();
