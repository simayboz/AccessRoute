<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İYTE AccessRoute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; padding-bottom: 80px; }
        .iyte-red { background: linear-gradient(135deg, #be1e2d 0%, #8b151f 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; border-radius: 24px; overflow: hidden; height: 300px; background: #020617; }
        #cameraVideo { width: 100%; height: 100%; object-fit: cover; }
        .comment-photo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; cursor: pointer; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #475569; font-size: 2rem; padding: 0 0.1rem; cursor: pointer; transition: color 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #fbbf24; }
        
        /* Tam Ekran Fotoğraf Overlay Stili */
        #fullscreenOverlay { position: fixed; inset: 0; background-color: rgba(2, 6, 23, 0.98); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); cursor: pointer; }
        #fullscreenOverlay img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 12px; box-shadow: 0 0 50px rgba(189, 30, 45, 0.3); }
        #fullscreenOverlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-100">
    <main id="app" class="mx-auto min-h-screen w-full max-w-md px-4 pt-4"></main>
    
    <div id="fullscreenOverlay" onclick="closeFullscreen()">
        <img id="fullscreenImage" src="" alt="Tam Ekran Görüntü">
        <span class="absolute top-6 right-6 text-white text-3xl font-black">&times;</span>
    </div>

    <script src="features/app.js"></script>
        
    
</body>
</html>
